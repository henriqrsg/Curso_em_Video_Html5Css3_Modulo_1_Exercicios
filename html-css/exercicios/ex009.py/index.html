<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol type="I"> <!-- type='I, i, A, a'-->
        <li>Acordar</li>
        <li>Arrumar a cama</li>
        <li>Lavar o rosto</li>
        <li>Tomar café</li>
        <li>Pegar o ônibus</li>
    </ol>
    <h2>Listas Não Ordenadas</h2>
    <ul type="circle"> <!-- type='circle, square, disc'-->
        <li>Pão</li>
        <li>Leite</li>
        <li>Feijão</li>
        <li>Arroz</li>
        <li>Macarrão</li>
        <li>Escova de dente</li>
    </ul>
</body>
</html>
